name: Story Asset Full Update

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      lang_srcs:
        description: "Per-language source lists, semicolon-separated. e.g. jp haruki sekai.best;cn haruki sekai.best"
        required: false
        default: "jp haruki sekai.best;cn haruki sekai.best"

permissions:
  contents: write

jobs:
  full-update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Full update story assets
        run: |
          LANG_SRCS="${{ inputs.lang_srcs || 'jp haruki sekai.best;cn haruki sekai.best' }}"
          ARGS=""
          IFS=';' read -ra ENTRIES <<< "$LANG_SRCS"
          for entry in "${ENTRIES[@]}"; do
            ARGS="$ARGS --lang-srcs $entry"
          done
          uv run python -m src.cli update-story-asset --full $ARGS

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d story_assets ]; then
            git add story_assets/
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): full story asset update [skip ci]"
          git push
