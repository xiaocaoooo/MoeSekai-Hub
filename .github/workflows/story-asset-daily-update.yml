name: Story Asset Incremental Update

on:
  schedule:
    - cron: "30 3 * * 2-6,0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Incremental update story assets
        id: asset
        continue-on-error: true
        run: uv run python -m src.cli update-story-asset --lang-srcs jp haruki sekai.best --lang-srcs cn haruki sekai.best

      - name: Generate latest story summary
        id: summary
        continue-on-error: true
        env:
          STORY_SUMMARY_API_KEY: ${{ secrets.STORY_SUMMARY_API_KEY }}
          STORY_SUMMARY_BASE_URL: ${{ vars.STORY_SUMMARY_BASE_URL }}
          STORY_SUMMARY_MODEL: ${{ vars.STORY_SUMMARY_MODEL }}
        run: uv run python -m src.cli update-story-summary

      - name: Fail if all tasks failed
        if: ${{ steps.asset.outcome == 'failure' && steps.summary.outcome == 'failure' }}
        run: |
          echo "All story update tasks failed."
          exit 1

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d story_assets ]; then
            git add story_assets/
          fi
          if [ -d story ]; then
            git add story/
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): incremental story asset and summary update [skip ci]"
          git push
